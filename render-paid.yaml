# Render Blueprint — PAID tier with persistent disk.
#
# Use this file when you want durable SQLite on Render.
# Persistent disks require a paid web service (Starter or higher).

services:
  - type: web
    name: awaaz-ai
    runtime: node
    plan: starter
    buildCommand: npm ci
    startCommand: node server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /data/awaaz.db
      - key: LOG_LEVEL
        value: info
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
      - key: GEMINI_MAX_TOKENS
        value: "1100"
      - key: GEMINI_MAX_RETRIES
        value: "2"
      - key: GEMINI_LETTER_STYLE
        value: compact
      - key: ENABLE_GROQ_FALLBACK
        value: "1"
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: ANALYZE_CACHE_MAX_ITEMS
        value: "300"
      - key: ANALYZE_CACHE_TTL_MS
        value: "86400000"
      - key: DAILY_AI_TOKEN_BUDGET
        value: "0"
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      - key: EMAIL_SECRET
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
    disk:
      name: awaaz-data
      mountPath: /data
      sizeGB: 1
