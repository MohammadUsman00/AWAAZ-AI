<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function () {
        var saved = localStorage.getItem('awaaz_theme');
        var sys = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        var theme = saved || sys;
        if (theme === 'light') {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
    <title>Awaaz AI — Admin</title>
    <link rel="stylesheet" href="/css/variables.css" />
    <link rel="stylesheet" href="/css/icons.css" />
    <link rel="stylesheet" href="/css/admin.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="admin-header-inner">
      <div class="admin-header-left">
        <h1>Awaaz AI Admin</h1>
        <button
          type="button"
          class="theme-toggle"
          id="themeToggle"
          aria-label="Toggle dark and light mode"
          title="Toggle theme"
        >
          <i data-lucide="moon" class="icon-md theme-icon-dark" aria-hidden="true"></i>
          <i data-lucide="sun" class="icon-md theme-icon-light" aria-hidden="true"></i>
        </button>
      </div>
      <div class="token-row">
        <input type="password" id="adminToken" placeholder="ADMIN_TOKEN (Bearer)" autocomplete="off" />
        <button type="button" id="saveToken">Save</button>
      </div>
    </header>
    <main>
      <div class="metrics" id="metrics"></div>
      <div class="filters">
        <div>
          <label for="q">Tracking ID</label>
          <input type="text" id="q" placeholder="Search…" />
        </div>
        <div>
          <label for="sev">Severity</label>
          <select id="sev">
            <option value="">All</option>
            <option value="critical">critical</option>
            <option value="high">high</option>
            <option value="medium">medium</option>
            <option value="low">low</option>
          </select>
        </div>
        <div>
          <label for="st">Status</label>
          <select id="st">
            <option value="">All</option>
            <option value="filed">filed</option>
            <option value="under_review">under_review</option>
            <option value="resolved">resolved</option>
            <option value="rejected">rejected</option>
          </select>
        </div>
        <div>
          <label for="lang">Language</label>
          <select id="lang">
            <option value="">All</option>
            <option value="en">en</option>
            <option value="ur">ur</option>
            <option value="hi">hi</option>
            <option value="ks">ks</option>
          </select>
        </div>
        <div>
          <label for="df">From</label>
          <input type="date" id="df" />
        </div>
        <div>
          <label for="dt">To</label>
          <input type="date" id="dt" />
        </div>
        <button type="button" id="applyFilters">Apply</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>Tracking</th>
            <th>Issue</th>
            <th>Department</th>
            <th>Severity</th>
            <th>Lang</th>
            <th>Status</th>
            <th>Date</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
      <div class="pager">
        <button type="button" id="prev">Prev</button>
        <span id="pageInfo"></span>
        <button type="button" id="next">Next</button>
      </div>
    </main>
    <div class="modal-overlay" id="modal" role="dialog" aria-modal="true">
      <div class="modal">
        <div class="modal-header">
          <h2 id="modalTitle">Complaint</h2>
          <button type="button" class="modal-close" id="modalClose" aria-label="Close">
            <i data-lucide="x" class="icon-md" aria-hidden="true"></i>
          </button>
        </div>
        <div id="modalBody"></div>
      </div>
    </div>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script>
      (function () {
        var THEME_KEY = 'awaaz_theme';
        var DARK = 'dark';
        var LIGHT = 'light';
        function getSavedTheme() {
          return localStorage.getItem(THEME_KEY);
        }
        function getSystemTheme() {
          return window.matchMedia('(prefers-color-scheme: light)').matches ? LIGHT : DARK;
        }
        function refreshLucide() {
          var L = window.lucide;
          if (L && typeof L.createIcons === 'function') L.createIcons();
        }
        function applyTheme(theme, persist) {
          var html = document.documentElement;
          if (theme === LIGHT) html.setAttribute('data-theme', 'light');
          else html.removeAttribute('data-theme');
          if (persist) localStorage.setItem(THEME_KEY, theme);
          refreshLucide();
        }
        function initTheme() {
          var saved = getSavedTheme();
          var initial = saved || getSystemTheme();
          applyTheme(initial, Boolean(saved));
          document.getElementById('themeToggle')?.addEventListener('click', function () {
            var isLight = document.documentElement.getAttribute('data-theme') === 'light';
            applyTheme(isLight ? DARK : LIGHT, true);
          });
          window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', function (e) {
            if (getSavedTheme()) return;
            applyTheme(e.matches ? LIGHT : DARK, false);
          });
        }
        initTheme();
        refreshLucide();
      })();
    </script>
    <script>
      (function () {
        const TOKEN_KEY = 'awaaz_admin_token';
        let offset = 0;
        const limit = 20;
        let total = 0;

        function refreshLucide() {
          var L = window.lucide;
          if (L && typeof L.createIcons === 'function') L.createIcons();
        }

        function token() {
          return sessionStorage.getItem(TOKEN_KEY) || document.getElementById('adminToken').value.trim();
        }

        function saveToken() {
          const v = document.getElementById('adminToken').value.trim();
          sessionStorage.setItem(TOKEN_KEY, v);
          loadAll();
        }

        function authHeaders() {
          const t = token();
          const h = { Accept: 'application/json' };
          if (t) h['Authorization'] = 'Bearer ' + t;
          return h;
        }

        async function loadStats() {
          const r = await fetch('/api/stats', { headers: authHeaders() });
          if (!r.ok) return;
          const s = await r.json();
          document.getElementById('metrics').innerHTML = [
            ['Total Complaints', s.total, ''],
            ['Critical', s.critical, 'saffron'],
            ['Resolved', s.resolved, 'emerald'],
            ['Sessions', s.sessions, 'gold'],
            ["Today's Count", s.today, 'emerald'],
          ]
            .map(
              ([label, val, cls]) =>
                `<div class="metric ${cls}"><div class="label">${label}</div><div class="val">${val ?? '—'}</div></div>`
            )
            .join('');
          refreshLucide();
        }

        function sevClass(sev) {
          const k = (sev || 'medium').toLowerCase();
          return ['critical', 'high', 'medium', 'low'].includes(k) ? k : 'medium';
        }

        async function loadTable() {
          const q = new URLSearchParams();
          q.set('limit', limit);
          q.set('offset', offset);
          const qv = document.getElementById('q').value.trim();
          if (qv) q.set('q', qv);
          const sev = document.getElementById('sev').value;
          if (sev) q.set('severity', sev);
          const st = document.getElementById('st').value;
          if (st) q.set('status', st);
          const lang = document.getElementById('lang').value;
          if (lang) q.set('language', lang);
          const df = document.getElementById('df').value;
          if (df) q.set('dateFrom', df);
          const dt = document.getElementById('dt').value;
          if (dt) q.set('dateTo', dt);

          const r = await fetch('/api/complaints?' + q.toString(), { headers: authHeaders() });
          if (r.status === 401) {
            document.getElementById('tbody').innerHTML =
              '<tr><td colspan="8">Unauthorized — set ADMIN_TOKEN and save.</td></tr>';
            refreshLucide();
            return;
          }
          if (!r.ok) {
            document.getElementById('tbody').innerHTML = '<tr><td colspan="8">Failed to load.</td></tr>';
            refreshLucide();
            return;
          }
          const data = await r.json();
          total = data.total || 0;
          const items = data.items || [];
          document.getElementById('tbody').innerHTML = items
            .map((row) => {
              const tid = row.trackingId;
              const bc = sevClass(row.severity);
              const pdf = '/api/complaints/' + encodeURIComponent(tid) + '/pdf';
              return `<tr>
              <td><span class="tid" data-id="${tid}">${tid}</span></td>
              <td>${escapeHtml(row.issue_type || '—')}</td>
              <td>${escapeHtml(row.department || '—')}</td>
              <td><span class="badge ${bc}">${bc}</span></td>
              <td>${escapeHtml(row.language || '')}</td>
              <td><select data-tid="${tid}" class="status-select">
                ${['filed', 'under_review', 'resolved', 'rejected']
                  .map((s) => `<option value="${s}" ${row.status === s ? 'selected' : ''}>${s}</option>`)
                  .join('')}
              </select></td>
              <td>${escapeHtml((row.createdAt || '').slice(0, 10))}</td>
              <td><a class="small" href="${pdf}" target="_blank"><i data-lucide="file-down" class="icon-sm" aria-hidden="true"></i> PDF</a>
              <button type="button" class="danger" data-del="${tid}">Delete</button></td>
            </tr>`;
            })
            .join('');

          const start = total === 0 ? 0 : offset + 1;
          const end = Math.min(offset + items.length, total);
          document.getElementById('pageInfo').textContent = `Showing ${start}-${end} of ${total}`;
          document.getElementById('prev').disabled = offset <= 0;
          document.getElementById('next').disabled = offset + limit >= total;

          document.querySelectorAll('.tid').forEach((el) => {
            el.addEventListener('click', () => openModal(el.dataset.id));
          });
          document.querySelectorAll('.status-select').forEach((sel) => {
            sel.addEventListener('change', async () => {
              const tid = sel.dataset.tid;
              const status = sel.value;
              const r = await fetch('/api/complaints/' + encodeURIComponent(tid) + '/status', {
                method: 'PATCH',
                headers: { ...authHeaders(), 'Content-Type': 'application/json' },
                body: JSON.stringify({ status }),
              });
              if (!r.ok) alert('Update failed');
            });
          });
          document.querySelectorAll('[data-del]').forEach((btn) => {
            btn.addEventListener('click', async () => {
              const tid = btn.dataset.del;
              if (!confirm('Delete ' + tid + '?')) return;
              const r = await fetch('/api/complaints/' + encodeURIComponent(tid), {
                method: 'DELETE',
                headers: authHeaders(),
              });
              if (r.ok) loadAll();
            });
          });
          refreshLucide();
        }

        function escapeHtml(s) {
          return String(s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
        }

        async function openModal(tid) {
          const r = await fetch('/api/complaints/' + encodeURIComponent(tid), { headers: authHeaders() });
          if (!r.ok) return;
          const row = await r.json();
          document.getElementById('modalTitle').textContent = row.trackingId;
          const a = row.analysis || {};
          const input = row.inputText ? `<p><strong>Original input</strong></p><pre>${escapeHtml(row.inputText)}</pre>` : '';
          document.getElementById('modalBody').innerHTML =
            input +
            `<p><strong>Issue</strong> ${escapeHtml(a.issue_type)} · <strong>Dept</strong> ${escapeHtml(
              a.department
            )}</p>
            <p><strong>Submit to</strong> ${escapeHtml(a.submit_to)}</p>
            <p><strong>English letter</strong></p><pre>${escapeHtml(a.english_letter)}</pre>
            <p><strong>Urdu letter</strong></p><pre>${escapeHtml(a.urdu_letter)}</pre>`;
          document.getElementById('modal').classList.add('open');
          refreshLucide();
        }

        function closeModal() {
          document.getElementById('modal').classList.remove('open');
        }

        function loadAll() {
          loadStats();
          loadTable();
        }

        document.getElementById('saveToken').addEventListener('click', saveToken);
        document.getElementById('applyFilters').addEventListener('click', () => {
          offset = 0;
          loadTable();
        });
        document.getElementById('prev').addEventListener('click', () => {
          offset = Math.max(0, offset - limit);
          loadTable();
        });
        document.getElementById('next').addEventListener('click', () => {
          offset += limit;
          loadTable();
        });
        document.getElementById('modalClose').addEventListener('click', closeModal);
        document.getElementById('modal').addEventListener('click', (e) => {
          if (e.target.id === 'modal') closeModal();
        });
        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape') closeModal();
        });

        const saved = sessionStorage.getItem(TOKEN_KEY);
        if (saved) document.getElementById('adminToken').value = saved;

        loadAll();
      })();
    </script>
  </body>
</html>
