<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Awaaz AI — Admin</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #0e0c0a;
        --ink2: #3a3530;
        --ink3: #8a847c;
        --saffron: #e8621a;
        --emerald: #1a6e4a;
        --gold: #d4a017;
        --crimson: #b91c1c;
        --surface: #1a1815;
        --card: #232019;
        --border: rgba(255, 255, 255, 0.08);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: 'DM Sans', sans-serif;
        background: var(--ink);
        color: #e8e4dc;
        min-height: 100vh;
      }
      header {
        background: linear-gradient(135deg, var(--saffron), #c24e12);
        padding: 1.25rem 1.5rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 12px;
      }
      header h1 {
        margin: 0;
        font-size: 1.25rem;
        font-weight: 700;
      }
      .token-row {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }
      .token-row input {
        padding: 8px 12px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(0, 0, 0, 0.2);
        color: #fff;
        min-width: 200px;
      }
      .token-row button {
        padding: 8px 14px;
        border-radius: 8px;
        border: none;
        background: #fff;
        color: var(--saffron);
        font-weight: 600;
        cursor: pointer;
      }
      main {
        padding: 1.5rem;
        max-width: 1400px;
        margin: 0 auto;
      }
      .metrics {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 12px;
        margin-bottom: 1.5rem;
      }
      .metric {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1rem;
      }
      .metric .label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--ink3);
      }
      .metric .val {
        font-size: 1.5rem;
        font-weight: 700;
        margin-top: 4px;
      }
      .metric.emerald .val {
        color: #4ade80;
      }
      .metric.saffron .val {
        color: #fb923c;
      }
      .metric.gold .val {
        color: #facc15;
      }
      .filters {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 1rem;
        align-items: flex-end;
      }
      .filters label {
        font-size: 11px;
        color: var(--ink3);
        display: block;
        margin-bottom: 4px;
      }
      .filters input,
      .filters select {
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: #e8e4dc;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
        background: var(--card);
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid var(--border);
      }
      th,
      td {
        padding: 10px 12px;
        text-align: left;
        border-bottom: 1px solid var(--border);
      }
      th {
        background: var(--surface);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--ink3);
      }
      tr:hover td {
        background: rgba(255, 255, 255, 0.02);
      }
      .badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 100px;
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
      }
      .badge.critical {
        background: rgba(185, 28, 28, 0.25);
        color: #fca5a5;
      }
      .badge.high {
        background: rgba(232, 98, 26, 0.2);
        color: #fdba74;
      }
      .badge.medium {
        background: rgba(212, 160, 23, 0.2);
        color: #fde047;
      }
      .badge.low {
        background: rgba(26, 110, 74, 0.25);
        color: #86efac;
      }
      .tid {
        color: #4ade80;
        font-family: monospace;
        font-weight: 700;
        cursor: pointer;
        text-decoration: underline;
      }
      .pager {
        display: flex;
        gap: 12px;
        align-items: center;
        margin-top: 1rem;
        font-size: 13px;
        color: var(--ink3);
      }
      .pager button {
        padding: 8px 14px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: #e8e4dc;
        cursor: pointer;
      }
      .pager button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.65);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 100;
        padding: 1rem;
      }
      .modal-overlay.open {
        display: flex;
      }
      .modal {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        max-width: 720px;
        width: 100%;
        max-height: 90vh;
        overflow: auto;
        padding: 1.25rem;
      }
      .modal h2 {
        margin: 0 0 1rem;
        font-size: 1.1rem;
      }
      .modal pre {
        white-space: pre-wrap;
        font-size: 12px;
        line-height: 1.5;
        background: var(--surface);
        padding: 12px;
        border-radius: 8px;
        max-height: 200px;
        overflow: auto;
      }
      .modal-close {
        float: right;
        background: transparent;
        border: none;
        color: var(--ink3);
        font-size: 1.25rem;
        cursor: pointer;
      }
      a.small {
        color: #fb923c;
        font-size: 12px;
      }
      .danger {
        color: #f87171;
        background: transparent;
        border: 1px solid rgba(248, 113, 113, 0.4);
        padding: 4px 10px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Awaaz AI Admin</h1>
      <div class="token-row">
        <input type="password" id="adminToken" placeholder="ADMIN_TOKEN (Bearer)" autocomplete="off" />
        <button type="button" id="saveToken">Save</button>
      </div>
    </header>
    <main>
      <div class="metrics" id="metrics"></div>
      <div class="filters">
        <div>
          <label for="q">Tracking ID</label>
          <input type="text" id="q" placeholder="Search…" />
        </div>
        <div>
          <label for="sev">Severity</label>
          <select id="sev">
            <option value="">All</option>
            <option value="critical">critical</option>
            <option value="high">high</option>
            <option value="medium">medium</option>
            <option value="low">low</option>
          </select>
        </div>
        <div>
          <label for="st">Status</label>
          <select id="st">
            <option value="">All</option>
            <option value="filed">filed</option>
            <option value="under_review">under_review</option>
            <option value="resolved">resolved</option>
            <option value="rejected">rejected</option>
          </select>
        </div>
        <div>
          <label for="lang">Language</label>
          <select id="lang">
            <option value="">All</option>
            <option value="en">en</option>
            <option value="ur">ur</option>
            <option value="hi">hi</option>
            <option value="ks">ks</option>
          </select>
        </div>
        <div>
          <label for="df">From</label>
          <input type="date" id="df" />
        </div>
        <div>
          <label for="dt">To</label>
          <input type="date" id="dt" />
        </div>
        <button type="button" id="applyFilters">Apply</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>Tracking</th>
            <th>Issue</th>
            <th>Department</th>
            <th>Severity</th>
            <th>Lang</th>
            <th>Status</th>
            <th>Date</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
      <div class="pager">
        <button type="button" id="prev">Prev</button>
        <span id="pageInfo"></span>
        <button type="button" id="next">Next</button>
      </div>
    </main>
    <div class="modal-overlay" id="modal" role="dialog" aria-modal="true">
      <div class="modal">
        <button type="button" class="modal-close" id="modalClose" aria-label="Close">&times;</button>
        <h2 id="modalTitle">Complaint</h2>
        <div id="modalBody"></div>
      </div>
    </div>
    <script>
      (function () {
        const TOKEN_KEY = 'awaaz_admin_token';
        let offset = 0;
        const limit = 20;
        let total = 0;

        function token() {
          return sessionStorage.getItem(TOKEN_KEY) || document.getElementById('adminToken').value.trim();
        }

        function saveToken() {
          const v = document.getElementById('adminToken').value.trim();
          sessionStorage.setItem(TOKEN_KEY, v);
          loadAll();
        }

        function authHeaders() {
          const t = token();
          const h = { Accept: 'application/json' };
          if (t) h['Authorization'] = 'Bearer ' + t;
          return h;
        }

        async function loadStats() {
          const r = await fetch('/api/stats', { headers: authHeaders() });
          if (!r.ok) return;
          const s = await r.json();
          document.getElementById('metrics').innerHTML = [
            ['Total Complaints', s.total, ''],
            ['Critical', s.critical, 'saffron'],
            ['Resolved', s.resolved, 'emerald'],
            ['Sessions', s.sessions, 'gold'],
            ["Today's Count", s.today, 'emerald'],
          ]
            .map(
              ([label, val, cls]) =>
                `<div class="metric ${cls}"><div class="label">${label}</div><div class="val">${val ?? '—'}</div></div>`
            )
            .join('');
        }

        function sevClass(sev) {
          const k = (sev || 'medium').toLowerCase();
          return ['critical', 'high', 'medium', 'low'].includes(k) ? k : 'medium';
        }

        async function loadTable() {
          const q = new URLSearchParams();
          q.set('limit', limit);
          q.set('offset', offset);
          const qv = document.getElementById('q').value.trim();
          if (qv) q.set('q', qv);
          const sev = document.getElementById('sev').value;
          if (sev) q.set('severity', sev);
          const st = document.getElementById('st').value;
          if (st) q.set('status', st);
          const lang = document.getElementById('lang').value;
          if (lang) q.set('language', lang);
          const df = document.getElementById('df').value;
          if (df) q.set('dateFrom', df);
          const dt = document.getElementById('dt').value;
          if (dt) q.set('dateTo', dt);

          const r = await fetch('/api/complaints?' + q.toString(), { headers: authHeaders() });
          if (r.status === 401) {
            document.getElementById('tbody').innerHTML =
              '<tr><td colspan="8">Unauthorized — set ADMIN_TOKEN and save.</td></tr>';
            return;
          }
          if (!r.ok) {
            document.getElementById('tbody').innerHTML = '<tr><td colspan="8">Failed to load.</td></tr>';
            return;
          }
          const data = await r.json();
          total = data.total || 0;
          const items = data.items || [];
          document.getElementById('tbody').innerHTML = items
            .map((row) => {
              const tid = row.trackingId;
              const bc = sevClass(row.severity);
              const pdf = '/api/complaints/' + encodeURIComponent(tid) + '/pdf';
              return `<tr>
              <td><span class="tid" data-id="${tid}">${tid}</span></td>
              <td>${escapeHtml(row.issue_type || '—')}</td>
              <td>${escapeHtml(row.department || '—')}</td>
              <td><span class="badge ${bc}">${bc}</span></td>
              <td>${escapeHtml(row.language || '')}</td>
              <td><select data-tid="${tid}" class="status-select">
                ${['filed', 'under_review', 'resolved', 'rejected']
                  .map((s) => `<option value="${s}" ${row.status === s ? 'selected' : ''}>${s}</option>`)
                  .join('')}
              </select></td>
              <td>${escapeHtml((row.createdAt || '').slice(0, 10))}</td>
              <td><a class="small" href="${pdf}" target="_blank">PDF</a>
              <button type="button" class="danger" data-del="${tid}">Delete</button></td>
            </tr>`;
            })
            .join('');

          const start = total === 0 ? 0 : offset + 1;
          const end = Math.min(offset + items.length, total);
          document.getElementById('pageInfo').textContent = `Showing ${start}-${end} of ${total}`;
          document.getElementById('prev').disabled = offset <= 0;
          document.getElementById('next').disabled = offset + limit >= total;

          document.querySelectorAll('.tid').forEach((el) => {
            el.addEventListener('click', () => openModal(el.dataset.id));
          });
          document.querySelectorAll('.status-select').forEach((sel) => {
            sel.addEventListener('change', async () => {
              const tid = sel.dataset.tid;
              const status = sel.value;
              const r = await fetch('/api/complaints/' + encodeURIComponent(tid) + '/status', {
                method: 'PATCH',
                headers: { ...authHeaders(), 'Content-Type': 'application/json' },
                body: JSON.stringify({ status }),
              });
              if (!r.ok) alert('Update failed');
            });
          });
          document.querySelectorAll('[data-del]').forEach((btn) => {
            btn.addEventListener('click', async () => {
              const tid = btn.dataset.del;
              if (!confirm('Delete ' + tid + '?')) return;
              const r = await fetch('/api/complaints/' + encodeURIComponent(tid), {
                method: 'DELETE',
                headers: authHeaders(),
              });
              if (r.ok) loadAll();
            });
          });
        }

        function escapeHtml(s) {
          return String(s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
        }

        async function openModal(tid) {
          const r = await fetch('/api/complaints/' + encodeURIComponent(tid), { headers: authHeaders() });
          if (!r.ok) return;
          const row = await r.json();
          document.getElementById('modalTitle').textContent = row.trackingId;
          const a = row.analysis || {};
          const input = row.inputText ? `<p><strong>Original input</strong></p><pre>${escapeHtml(row.inputText)}</pre>` : '';
          document.getElementById('modalBody').innerHTML =
            input +
            `<p><strong>Issue</strong> ${escapeHtml(a.issue_type)} · <strong>Dept</strong> ${escapeHtml(
              a.department
            )}</p>
            <p><strong>Submit to</strong> ${escapeHtml(a.submit_to)}</p>
            <p><strong>English letter</strong></p><pre>${escapeHtml(a.english_letter)}</pre>
            <p><strong>Urdu letter</strong></p><pre>${escapeHtml(a.urdu_letter)}</pre>`;
          document.getElementById('modal').classList.add('open');
        }

        function closeModal() {
          document.getElementById('modal').classList.remove('open');
        }

        function loadAll() {
          loadStats();
          loadTable();
        }

        document.getElementById('saveToken').addEventListener('click', saveToken);
        document.getElementById('applyFilters').addEventListener('click', () => {
          offset = 0;
          loadTable();
        });
        document.getElementById('prev').addEventListener('click', () => {
          offset = Math.max(0, offset - limit);
          loadTable();
        });
        document.getElementById('next').addEventListener('click', () => {
          offset += limit;
          loadTable();
        });
        document.getElementById('modalClose').addEventListener('click', closeModal);
        document.getElementById('modal').addEventListener('click', (e) => {
          if (e.target.id === 'modal') closeModal();
        });
        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape') closeModal();
        });

        const saved = sessionStorage.getItem(TOKEN_KEY);
        if (saved) document.getElementById('adminToken').value = saved;

        loadAll();
      })();
    </script>
  </body>
</html>
