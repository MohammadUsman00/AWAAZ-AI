version: '3.9'
services:
  awaaz:
    build: .
    ports:
      - '8080:8080'
    volumes:
      - ./data:/app/data
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - ADMIN_TOKEN=${ADMIN_TOKEN}
      - EMAIL_SECRET=${EMAIL_SECRET}
      - NODE_ENV=production
    restart: unless-stopped
