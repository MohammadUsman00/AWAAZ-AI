services:
  - type: web
    name: awaaz-ai
    runtime: node
    buildCommand: npm install
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: ADMIN_TOKEN
        generateValue: true
      - key: EMAIL_SECRET
        generateValue: true
    disk:
      name: awaaz-data
      mountPath: /app/data
      sizeGB: 1
